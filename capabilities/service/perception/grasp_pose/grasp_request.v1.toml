# Compute a grasp pose for a named object inside a caller-supplied 2D ROI.
#
# Roboarm-style version: the handler projects the bbox center pixel to
# arm-plane XY through a required 3x3 2D homography, derives gripper yaw
# from the bbox long edge, applies catch_offset to the final grasp point,
# and outputs a vertical-down pose in arm/base_link at
# default_desktop_height.
#
# Depth / camera_info / TF are NOT consumed. object_center_3d and retry stay
# in the IDL for wire compatibility but are ignored by this implementation.
#
# IDL: lib/grasp/srv/GraspRequest.srv (package-local). This package exposes
# the robonix gRPC path; legacy ROS /graspnet compatibility has been removed.
[contract]
id      = "robonix/service/perception/grasp_pose/grasp_request"
version = "1"
kind    = "service"
idl     = "grasp/srv/GraspRequest.srv"

[mode]
type = "rpc"
