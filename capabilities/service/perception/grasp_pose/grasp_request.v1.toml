# Compute a grasp pose for a named object inside an optional 2D ROI +
# 3D centroid hint. The handler may internally call
# robonix/service/perception/object_detect/detect_object to localise
# the target if bbox_2d / object_center_3d are empty.
#
# Vertical-grasp version: instead of depth-median back-projection, the
# handler casts a ray from the camera through the bbox center pixel,
# transforms it into arm/base_link via the hand-eye-calibrated TF
# (easy_handeye2_rbnx), and intersects it with the table plane
# (z = z_table). The pose is output in arm/base_link with a fixed
# vertical-down quaternion (roll=pi, pitch=0, yaw=configurable).
#
# Depth is NOT consumed — the object_center_3d field is advisory only.
#
# IDL: lib/grasp/srv/GraspRequest.srv (package-local). Schema is
# bytes-compatible with upstream graspnet_msgs/srv/GraspRequest.srv,
# just renamed for the robonix namespace. Same handler serves both
# the MCP path and the legacy ROS service /graspnet/grasp_request.
[contract]
id      = "robonix/service/perception/grasp_pose/grasp_request"
version = "1"
kind    = "service"
idl     = "grasp/srv/GraspRequest.srv"

[mode]
type = "rpc"

[semantics]
user_invocable = true
