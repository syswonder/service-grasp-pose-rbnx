# grasp_pose_rbnx — pure MCP roboarm-style grasp-pose estimator.
#
# Pure CPU. No ML model, no GPU, no torch, no legacy /graspnet ROS
# trigger path. Owns `robonix/service/perception/grasp_pose/*`.
#
# The caller must provide bbox_2d. The bbox center pixel is mapped to
# arm-plane XY through a required 3x3 2D hand-eye homography, gripper
# yaw is derived from the bbox long edge, and catch_offset is applied
# to the final grasp point. Depth, camera intrinsics, and hand-eye TF
# are NOT used by the algorithm.
#
# Runtime role:
#   * SERVER (atlas MCP): grasp_pose/grasp_request
#
# Lifecycle:
#   on_init       — parse cfg, load homography.
#   on_deactivate — clear initialized state.
#
# Capability surface:
#   service/perception/grasp_pose/driver         mode=rpc transport=gRPC
#   service/perception/grasp_pose/grasp_request  mode=rpc transport=MCP
#
# Config (passed via Driver(CMD_INIT, config_json)):
#
#   ── REQUIRED roboarm grasp parameters ──
#   hand_eye_calibration_file   str         path to 3x3 .npy homography
#                                            mapping pixel [u,v,1] to
#                                            arm-plane [x,y,1].
#   homography_matrix           float[3][3] inline alternative to file.
#   default_desktop_height      float       final grasp z in arm/base_link.
#
#   ── Optional roboarm grasp parameters ──
#   catch_offset                float       default 0.01 — XY offset along
#                                            computed gripper yaw.
#   box_rotation_deg            float       default 0.0 — used when bbox_2d
#                                            has no fifth rotation element.
#   approach_dist               float       default 0.10  — hover height for
#                                            pre/post grasp (m). Used by
#                                            pick_skill_rbnx.
#   output_frame                str         default arm/base_link — pose output
#                                            frame consumed by roboarm_ik.
#
#   ── Output knobs ──
#   gripper_width_default       float       default 0.04 — returned to caller
#
# config/vertical_grasp.yaml is documentation only; runtime config comes
# from the deploy manifest.
manifestVersion: 1

package:
  name: robonix.service.grasp_pose
  version: 0.1.0
  vendor: robonix
  description: Geometric grasp-pose estimator (pure MCP).
  license: MulanPSL-2.0
  tags: [service, perception, grasp_pose, grasp, ros2]
  maintainers: ["lhw2002426 <lhw2002426@users.noreply.github.com>"]

capability_id: grasp_pose

build: bash scripts/build.sh
start: bash scripts/start.sh

capabilities:
  - name: robonix/service/perception/grasp_pose/driver
  - name: robonix/service/perception/grasp_pose/grasp_request
